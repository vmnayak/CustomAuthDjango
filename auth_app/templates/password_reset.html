{% extends 'auth_base.html' %}
{% block title %}Forgot Password{% endblock %}
{% block heading %}<i class="fa fa-user-lock"></i> Forgot Password{% endblock %}
{% block content %}
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Enter Your Email</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa fa-envelope"></i></span>
                                <input type="email" name="email" class="form-control" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary btn-custom w-100">Send Reset Link</button>
                    </form>

                    <div class="text-center mt-3">
                        <a href="{% url 'login' %}" class="text-decoration-none">Back to Login</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
