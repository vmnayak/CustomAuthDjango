{% extends 'auth_base.html' %}
{% block title %}Reset Password{% endblock %}
{% block heading %}<i class="fa fa-user-lock"></i> Reset Password{% endblock %}
{% block content %}
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">New Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa fa-lock"></i></span>
                                <input type="password" name="new_password1" class="form-control" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Confirm New Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa fa-lock"></i></span>
                                <input type="password" name="new_password2" class="form-control" required>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary btn-custom w-100">Reset Password</button>
                    </form>

                    <div class="text-center mt-3">
                        <a href="{% url 'login' %}" class="text-decoration-none">Back to Login</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
